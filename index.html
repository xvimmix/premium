<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🪽</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background-color: #0c0a0f;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
        }
        .card {
            background-color: #110f14;
            border: 1px solid #1c1921;
            border-radius: 16px;
            padding: 28px;
            width: 100%;
            max-width: 360px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.6);
            text-align: left;
            box-sizing: border-box;
        }
        .badge {
            background-color: #2b1616;
            color: #ff3b3b;
            font-size: 11px;
            font-weight: 600;
            padding: 6px 12px;
            border-radius: 20px;
            display: inline-block;
            margin-bottom: 16px;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }
        h1 {
            font-size: 26px;
            font-weight: 700;
            margin: 0 0 16px 0;
            display: flex;
            gap: 8px;
        }
        .title-happy {
            background: linear-gradient(to right, #ff3b3b, #ff2a2a);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .title-script {
            background: linear-gradient(to right, #f1c40f, #f39c12);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        ul {
            margin: 0 0 24px 0;
            padding-left: 20px;
            color: #9894a6;
            font-size: 13.5px;
            line-height: 1.8;
        }
        ul li strong {
            color: #ffffff;
        }

        .btn-discord {
            background-color: #5865F2;
            color: #ffffff;
            border: none;
            width: 100%;
            padding: 12px 0;
            font-size: 14px;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            text-decoration: none;
            margin-bottom: 20px;
            box-sizing: border-box;
            transition: background-color 0.2s, transform 0.1s;
        }
        .btn-discord:hover {
            background-color: #4752C4;
        }
        .btn-discord:active {
            transform: scale(0.98);
        }

        .code-box-container {
            margin-top: 15px;
            width: 100%;
        }
        .code-box {
            background-color: #070609;
            border: 1px solid #ff2a2a;
            color: #e0e0e0;
            font-family: 'Courier New', Courier, monospace;
            font-size: 12px;
            padding: 12px;
            border-radius: 6px 6px 0 0;
            white-space: nowrap;
            overflow-x: auto;
            box-sizing: border-box;
        }
        .btn-copy-red {
            background-color: #ff2a2a;
            color: #ffffff;
            border: none;
            width: 100%;
            padding: 10px 0;
            font-size: 12px;
            font-weight: bold;
            letter-spacing: 1px;
            border-radius: 0 0 6px 6px;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            text-transform: uppercase;
            transition: background-color 0.2s;
        }
        .btn-copy-red:hover {
            background-color: #d61f1f;
        }
    </style>
    <script>
        // Chặn chuột phải và phím F12 công thức cũ
        document.addEventListener('contextmenu', e => e.preventDefault());
        document.onkeydown = function(e) {
            if (e.keyCode === 123) return false; 
            if (e.ctrlKey && e.shiftKey && e.keyCode === 73) return false; 
            if (e.ctrlKey && (e.keyCode === 67 || e.keyCode === 85 || e.keyCode === 83)) return false;
        };

        // Hàm sao chép loadstring mượt mà
        function copyScript() {
            const currentUrl = window.location.href.split('?')[0].split('#')[0];
            const loadstringText = 'loadstring(game:HttpGet("' + currentUrl + '"))()';
            
            navigator.clipboard.writeText(loadstringText).then(function() {
                document.getElementById('btnText').innerText = "COPIED!";
                document.getElementById('btnIcon').className = "fa-solid fa-check";
                
                alert("Copied to clipboard");
                
                setTimeout(function() {
                    document.getElementById('btnText').innerText = "COPY";
                    document.getElementById('btnIcon').className = "fa-regular fa-copy";
                }, 2000);
            }).catch(function(err) {
                alert("Lỗi sao chép tự động!");
            });
        }
    </script>
</head>
<body>
    <div class="card">
        <div class="badge">@brian.2xz on TikTok</div>
        <h1>
            <span class="title-o">Overdrive</span>
            <span class="title-s">[Premium]</span>
        </h1>
        
        <ul>
            <li><strong>Elite Features:</strong> Instant Kill Aura, Auto-Farm & Silent Aim.</li>
            <li><strong>Anti-Ban:</strong> Premium bypass system ensuring 100% safety and zero bans.</li>
            <li><strong>Instant Updates:</strong> 24/7 support & lag-free performance.</li>
        </ul>

        <!-- Nút Join Discord hoạt động ổn định ổn định -->
        <a href="https://discord.gg/Rf6KWhJ8xE" target="_blank" class="btn-discord">
            <i class="fa-brands fa-discord"></i> Join Discord
        </a>

        <div class="code-box-container">
            <!-- Ô chứa text -->
            <div class="code-box" id="codeDisplay">Generating link...</div>
            
            <!-- Đoạn Script điền link chạy ngay lập tức, không gây lỗi giao diện -->
            <script>
                (function() {
                    const currentUrl = window.location.href.split('?')[0].split('#')[0];
                    document.getElementById('codeDisplay').textContent = 'loadstring(game:HttpGet("' + currentUrl + '"))()';
                })();
            </script>

            <button class="btn-copy-red" onclick="copyScript()">
                <i id="btnIcon" class="fa-regular fa-copy"></i>
                <span id="btnText">Copy</span>
            </button>
        </div>
    </div>
</body>
</html>
